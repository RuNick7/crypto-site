// Order for prev/next navigation
const ORDER = ['adfgvx','enigma_patent','enigma_polish','turing_bombe','magic','venona','des','rsa'];

// ── Render ──────────────────────────────────────────────────────
function render() {
  const id = new URLSearchParams(location.search).get('id') || 'adfgvx';
  const data = CIPHERS[id];
  if (!data) {
    document.getElementById('heroTitle').textContent = '404 — Досье не найдено';
    return;
  }

  document.title = data.title + ' — Секретный Архив';
  document.getElementById('heroTag').textContent   = data.tag;
  document.getElementById('heroTitle').textContent = data.title;
  document.getElementById('heroSub').textContent   = data.sub;

  // Hero nav
  const heroNav = document.getElementById('heroNav');
  if (data.op) {
    heroNav.innerHTML += `<a href="${data.op}" class="btn btn-primary">ИНТЕРАКТИВНАЯ ОПЕРАЦИЯ ▶</a>`;
  }
  heroNav.innerHTML += `<a href="index.html" class="btn btn-ghost">← В АРХИВ</a>`;

  // Facts
  const facts = data.facts.map(f =>
    `<div class="fact-cell"><div class="fact-label">${f.label}</div><div class="fact-value">${f.value}</div></div>`
  ).join('');
  let html = `<div class="fact-grid">${facts}</div>`;

  // Sections
  data.sections.forEach(s => {
    if (s.type === 'panel') {
      html += `
        <div class="panel mt-3">
          <div class="panel-header"><h3>${s.title}</h3></div>
          <div class="panel-body">${s.body}</div>
        </div>`;
    }
    else if (s.type === 'persons') {
      html += `<h2 style="margin-top:2.5rem">${s.title}</h2>`;
      html += `<div class="mt-2" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem">`;
      s.persons.forEach(p => {
        html += `<div class="person-card">
          <div class="person-name">${p.name}</div>
          <div class="person-role">${p.role}</div>
          <div class="person-bio">${p.bio}</div>
        </div>`;
      });
      html += `</div>`;
    }
    else if (s.type === 'quote') {
      html += `<div class="quote-block">
        <div class="quote-text">«${s.text}»</div>
        <div class="quote-author">${s.author}</div>
      </div>`;
    }
    else if (s.type === 'timeline') {
      html += `<h2 style="margin-top:2.5rem">${s.title}</h2>`;
      html += `<div style="margin-top:1.25rem; padding-left:2rem; position:relative">`;
      html += `<div style="position:absolute;left:0.5rem;top:0;bottom:0;width:1px;background:var(--border)"></div>`;
      s.entries.forEach((e, i) => {
        const last = i === s.entries.length - 1;
        html += `<div class="tl-entry">
          ${!last ? '<div class="tl-spine"></div>' : ''}
          <div class="tl-year-inline">${e.year}</div>
          <div class="tl-text">${e.text}</div>
        </div>`;
      });
      html += `</div>`;
    }
    else if (s.type === 'impact') {
      html += `<h2 style="margin-top:2.5rem">${s.title}</h2>`;
      html += `<div class="panel mt-2"><div class="panel-body">`;
      s.items.forEach(item => {
        html += `<div class="impact-row"><span class="impact-icon">${item.icon}</span><span>${item.text}</span></div>`;
      });
      html += `</div></div>`;
    }
  });

  document.getElementById('cipherContent').innerHTML = html;

  // Bottom nav
  const idx = ORDER.indexOf(id);
  const prevId = ORDER[idx - 1];
  const nextId = ORDER[idx + 1];
  const bottomNav = document.getElementById('bottomNav');

  if (prevId && CIPHERS[prevId]) {
    bottomNav.innerHTML += `<a href="cipher.html?id=${prevId}" class="btn btn-ghost">← ${CIPHERS[prevId].title}</a>`;
  }
  if (nextId && CIPHERS[nextId]) {
    bottomNav.innerHTML += `<a href="cipher.html?id=${nextId}" class="btn">→ ${CIPHERS[nextId].title}</a>`;
  }
  bottomNav.innerHTML += `<a href="index.html" class="btn btn-ghost" style="margin-left:auto">← В АРХИВ</a>`;

  // Clearance
  const ops  = ['vigenere','enigma','venona'];
  const done = ops.filter(o => localStorage.getItem('done_'+o)).length;
  document.getElementById('clearanceLevel').textContent = done;
  document.getElementById('clearanceFill').style.width = (done / 3 * 100) + '%';
}

render();
